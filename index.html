<!-- Remote high score bridge (Firebase or JSONbin — configured in config.js) -->
<script type="module">
const BASE = 'https://api.jsonbin.io/v3/b';

// --- JSONbin ---
if (CONFIG.jsonbin && CONFIG.jsonbin.enabled) {
  const { binId, apiKey } = CONFIG.jsonbin;
  const headers = { 'X-Master-Key': apiKey };

  // Load
  try {
    const res  = await fetch(`${BASE}/${binId}/latest`, { headers });
    const json = await res.json();
    const rec  = json.record || {};
    if (window._onRemoteScore) window._onRemoteScore(rec.best || 0);
    if (window._onRemoteLeaderboard) window._onRemoteLeaderboard(rec.scores || []);
  } catch(e) { console.warn('JSONbin load failed', e); }

  // Save helper — writes both best score and scores array
  window._fbSaveHighScore = async (score) => {
    try {
      // First read current record so we don't overwrite scores array
      const res  = await fetch(`${BASE}/${binId}/latest`, { headers });
      const json = await res.json();
      const rec  = json.record || {};
      await fetch(`${BASE}/${binId}`, {
        method:  'PUT',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body:    JSON.stringify({ ...rec, best: score }),
      });
    } catch(e) { console.warn('JSONbin save failed', e); }
  };

  window._fbSaveLeaderboard = async (scores) => {
    try {
      const res  = await fetch(`${BASE}/${binId}/latest`, { headers });
      const json = await res.json();
      const rec  = json.record || {};
      await fetch(`${BASE}/${binId}`, {
        method:  'PUT',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body:    JSON.stringify({ ...rec, scores }),
      });
    } catch(e) { console.warn('JSONbin leaderboard save failed', e); }
  };
}

// --- Firebase ---
if (CONFIG.firebase) {
  const { initializeApp }         = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const { getFirestore, doc, getDoc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

  const app = initializeApp(CONFIG.firebase);
  const db  = getFirestore(app);
  const REF = () => doc(db, 'scores', 'global');

  try {
    const snap = await getDoc(REF());
    if (snap.exists()) {
      const data = snap.data();
      if (window._onRemoteScore)       window._onRemoteScore(data.best || 0);
      if (window._onRemoteLeaderboard) window._onRemoteLeaderboard(data.scores || []);
    }
  } catch(e) { console.warn('Firebase load failed', e); }

  window._fbSaveHighScore = async (score) => {
    try {
      const snap = await getDoc(REF());
      const prev = snap.exists() ? snap.data() : {};
      await setDoc(REF(), { ...prev, best: score });
    } catch(e) { console.warn('Firebase save failed', e); }
  };

  window._fbSaveLeaderboard = async (scores) => {
    try {
      const snap = await getDoc(REF());
      const prev = snap.exists() ? snap.data() : {};
      await setDoc(REF(), { ...prev, scores });
    } catch(e) { console.warn('Firebase leaderboard save failed', e); }
  };
}
</script>

// ============================================================
// AUDIO ENGINE (procedural, Web Audio API)
// ============================================================
let audioCtx = null;
let muted = false;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol, ramp) {
  if (muted || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (ramp) o.frequency.linearRampToValueAtTime(ramp, audioCtx.currentTime + duration);
  g.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + duration);
}

// Called by the module script once the remote leaderboard has loaded.

  leaderboard = scores.filter(e => e && e.name).sort((a, b) => b.score - a.score);
  try { localStorage.setItem('gtn_leaderboard', JSON.stringify(leaderboard)); } catch(e) {}
};

function saveLeaderboard() {
  try { localStorage.setItem('gtn_leaderboard', JSON.stringify(leaderboard)); } catch(e) {}
  if (window._fbSaveLeaderboard) window._fbSaveLeaderboard(leaderboard);
}

// Add a new entry — duplicates allowed, each submission is its own entry.
function submitToLeaderboard(name, score) {
  if (!name) return;
  leaderboard.push({ name, score });
  leaderboard.sort((a, b) => b.score - a.score);
  if (leaderboard.length > LB_MAX) leaderboard = leaderboard.slice(0, LB_MAX);
  saveLeaderboard();
}

function saveHighScore() {
  localHighScore = highScore;
  try { localStorage.setItem('gtn_highscore', highScore); } catch(e) {}
  if (window._fbSaveHighScore) window._fbSaveHighScore(highScore);
}

function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height)
  };
}

canvas.addEventListener('mousemove', e => {
  const p = getCanvasPos(e.clientX, e.clientY);
  pointerX = p.x;
  pointerActive = true;
});
canvas.addEventListener('mousedown', e => {
  ensureAudio();
  const p = getCanvasPos(e.clientX, e.clientY);
  pointerX = p.x;
  clickX = p.x;
  clickY = p.y;
  if (!checkMuteClick(p.x, p.y)) clicked = true;

// ============================================================
// SPRITE DRAWING HELPERS
// ============================================================
const PIXEL_OVERLAP = 0.35;

function drawPixelRect(x, y, w, h, color) {
  const left = Math.round(x);
  const top = Math.round(y);
  const right = Math.round(x + w);
  const bottom = Math.round(y + h);
  ctx.fillStyle = color;
  ctx.fillRect(
    left - PIXEL_OVERLAP,
    top - PIXEL_OVERLAP,
    Math.max(1, right - left) + PIXEL_OVERLAP * 2,
    Math.max(1, bottom - top) + PIXEL_OVERLAP * 2
  );
}

function drawPixelChar(x, y, pixels, palette, scale) {
  scale = scale || 1;
  for (let row = 0; row < pixels.length; row++) {
    for (let col = 0; col < pixels[row].length; col++) {
      const c = pixels[row][col];
      if (c !== 0 && palette[c]) {
        const left = Math.round(x + col * scale);
        const top = Math.round(y + row * scale);
        const right = Math.round(x + (col + 1) * scale);
        const bottom = Math.round(y + (row + 1) * scale);
        ctx.fillStyle = palette[c];
        ctx.fillRect(
          left - PIXEL_OVERLAP,
          top - PIXEL_OVERLAP,
          Math.max(1, right - left) + PIXEL_OVERLAP * 2,
          Math.max(1, bottom - top) + PIXEL_OVERLAP * 2
        );
      }
    }
  }
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function loadImageCandidates(sources) {
  let idx = 0;
  function next() {
    if (idx >= sources.length) return Promise.reject(new Error('no image candidates found'));
    const src = sources[idx++];
    return loadImage(src).catch(next);
  }
  return next();
}

function avgCornerColor(data, w, h, sx, sy, size) {
  let r = 0, g = 0, b = 0, n = 0;
  for (let y = sy; y < sy + size; y++) {
    for (let x = sx; x < sx + size; x++) {
      const i = (y * w + x) * 4;
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
      n++;
    }
  }
  return { r: r / n, g: g / n, b: b / n };
}

function preprocessCharacterImage(img, maxDim, threshold) {
  const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
  const w = Math.max(1, Math.round(img.naturalWidth * scale));
  const h = Math.max(1, Math.round(img.naturalHeight * scale));

  const base = document.createElement('canvas');
  base.width = w;
  base.height = h;
  const bctx = base.getContext('2d', { willReadFrequently: true });
  bctx.drawImage(img, 0, 0, w, h);

  const imageData = bctx.getImageData(0, 0, w, h);
  const d = imageData.data;
  let hasTransparency = false;
  for (let i = 3; i < d.length; i += 4) {
    if (d[i] < 250) {
      hasTransparency = true;
      break;
    }
  }

  let corners = null;
  if (!hasTransparency) {
    const sample = Math.max(6, Math.floor(Math.min(w, h) * 0.06));
    corners = [
      avgCornerColor(d, w, h, 0, 0, sample),
      avgCornerColor(d, w, h, w - sample, 0, sample),
      avgCornerColor(d, w, h, 0, h - sample, sample),
      avgCornerColor(d, w, h, w - sample, h - sample, sample),
    ];
  }

  let minX = w, minY = h, maxX = -1, maxY = -1;
  const t2 = threshold * threshold;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const a = d[i + 3];
      let keep = a > 24;

      if (!hasTransparency && keep) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        for (const c of corners) {
          const dr = r - c.r;
          const dg = g - c.g;
          const db = b - c.b;
          if (dr * dr + dg * dg + db * db <= t2) {
            keep = false;
            break;
          }
        }

        // Drop very bright backdrop leftovers.
        if (keep && r > 240 && g > 240 && b > 240) keep = false;
      }

      if (!keep) {
        d[i + 3] = 0;
      } else {
        if (!hasTransparency) d[i + 3] = 255;
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }

  bctx.putImageData(imageData, 0, 0);
  if (maxX < minX || maxY < minY) return base;

  const pad = 3;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(w - 1, maxX + pad);
  maxY = Math.min(h - 1, maxY + pad);

  const tw = maxX - minX + 1;
  const th = maxY - minY + 1;
  const trimmed = document.createElement('canvas');
  trimmed.width = tw;
  trimmed.height = th;
  const tctx = trimmed.getContext('2d');
  tctx.drawImage(base, minX, minY, tw, th, 0, 0, tw, th);
  return trimmed;
}

// ITEM SPRITES (drawn procedurally)
// ============================================================
function drawItem(x, y, type, scale) {
  scale = scale || 2;
  const cx = Math.round(x);
  const cy = Math.round(y);
  ctx.save();
  switch(type) {
    case 'sock':
      // Pair of socks: shaft has constant width, foot/toe section flares outward.
      drawPixelRect(cx, cy + 1*scale, 3*scale, 7*scale, COL.sage);
      drawPixelRect(cx- 2*scale, cy + 6*scale, 4*scale, 3*scale, COL.sage);
      drawPixelRect(cx- 3*scale, cy + 6.5*scale, 4*scale, 2*scale, COL.sage);
      drawPixelRect(cx, cy + 2*scale, 3*scale, 1*scale, COL.offWhite);

      drawPixelRect(cx + 4*scale, cy + 1*scale, 3*scale, 7*scale, COL.sage);
      drawPixelRect(cx + 5*scale, cy + 6*scale, 4*scale, 3*scale, COL.sage);
      drawPixelRect(cx + 6*scale, cy + 6.5*scale, 4*scale, 2*scale, COL.sage);
      drawPixelRect(cx + 4*scale, cy + 2*scale, 3*scale, 1*scale, COL.offWhite);
      break;
    case 'dress': {
      // Single-piece A-line dress, U-neckline, widens to hem
      const drkGreen = '#2d5a30';
      // U-neckline: two straps, open centre
      drawPixelRect(cx - 0*scale, cy,           3*scale, 4*scale, drkGreen);
      drawPixelRect(cx + 4*scale, cy,           3*scale, 4*scale, drkGreen);
      // Bodice — joins straps into one solid piece
      drawPixelRect(cx + 1*scale, cy + 2*scale, 5*scale, 3*scale, drkGreen);
      // Skirt — widens with each row, no break from bodice
      drawPixelRect(cx + 0.7*scale, cy + 5*scale, 6*scale, 2*scale, drkGreen);
      drawPixelRect(cx - 0.1*scale, cy + 7*scale, 7*scale, 2*scale, drkGreen);
      drawPixelRect(cx - 0.5*scale, cy + 9*scale, 8*scale, 2*scale, drkGreen);
      break;
    }
    case 'pants':
      drawPixelRect(cx + 1*scale, cy, 6*scale, 3*scale, '#8ab9eb');
      drawPixelRect(cx + 1*scale, cy + 1*scale, 6*scale, 1*scale, '#8ab9eb');
      drawPixelRect(cx + 1*scale, cy + 3*scale, 2.5*scale, 7*scale, '#8ab9eb');
      drawPixelRect(cx + 4.25*scale, cy + 3*scale, 2.5*scale, 7*scale, '#8ab9eb');
      drawPixelRect(cx + 3.5*scale, cy + 0*scale, 1*scale, 2*scale, '#6a9edb');
      break;
    case 'scarf':
      ctx.strokeStyle = COL.rose;
      ctx.lineWidth = 3*scale;
      ctx.beginPath();
      ctx.arc(cx + 4*scale, cy + 1*scale, 3*scale, 0, Math.PI * 2);
      ctx.stroke();
      drawPixelRect(cx - 0.5*scale, cy + 2*scale, 3*scale, 4*scale, COL.rose);
      drawPixelRect(cx - 0.5*scale, cy + 6*scale, 0.5*scale, 1*scale, COL.rose);
      drawPixelRect(cx + 0.5*scale, cy + 6*scale, 0.5*scale, 1*scale, COL.rose);
      drawPixelRect(cx + 1.5*scale, cy + 6*scale, 0.5*scale, 1*scale, COL.rose);

      drawPixelRect(cx + 5.5*scale, cy + 2*scale, 3*scale, 5*scale, COL.rose);
      drawPixelRect(cx + 6*scale, cy + 7*scale, 0.5*scale, 1*scale, COL.rose);
      drawPixelRect(cx + 7*scale, cy + 7*scale, 0.5*scale, 1*scale, COL.rose);
      drawPixelRect(cx + 8*scale, cy + 7*scale, 0.5*scale, 1*scale, COL.rose);
      break;
    case 'tshirt':
      drawPixelRect(cx + 2*scale, cy, 4*scale, 1*scale, COL.offWhite);
      drawPixelRect(cx + 1*scale, cy + 1*scale, 6*scale, 7*scale, COL.offWhite);
      // Arms
      drawPixelRect(cx - 0.5*scale, cy + 1*scale, 2*scale, 3*scale, COL.offWhite);
      drawPixelRect(cx + 6*scale, cy + 1*scale, 2*scale, 3*scale, COL.offWhite);
      break;
    case 'hoodie':
      drawPixelRect(cx + 1.5*scale, cy + 2*scale, 5*scale, 7*scale, COL.sage);
      drawPixelRect(cx + 2*scale, cy + 3*scale, 4*scale, 1*scale, COL.darkGreen);
      drawPixelRect(cx + 2*scale, cy + 6*scale, 4*scale, 1*scale, COL.darkGreen);

      // Arms
      drawPixelRect(cx, cy + 2*scale, 2*scale, 3*scale, COL.sage);
      drawPixelRect(cx-1*scale, cy + 2.5*scale, 2*scale, 7*scale, COL.sage);
      drawPixelRect(cx + 6*scale, cy + 2*scale, 2*scale, 3*scale, COL.sage);
      drawPixelRect(cx + 7*scale, cy + 2.5*scale, 2*scale, 7*scale, COL.sage);

      // Head
      drawPixelRect(cx + 2*scale, cy +0*scale, 4*scale, 2*scale, COL.darkGreen);
      drawPixelRect(cx + 3*scale, cy + 1*scale, 2*scale, 1*scale, '#4f6f47');
      break;
    case 'hat':
      drawPixelRect(cx + 2*scale, cy, 5*scale, 4*scale, COL.black);
      drawPixelRect(cx + 1*scale, cy + 4*scale, 7*scale, 1*scale, COL.black);
      break;
    case 'weddingDress':
      drawPixelRect(cx + 3*scale, cy-1, 1*scale, 2.5*scale, COL.white);
      drawPixelRect(cx + 6*scale, cy-1, 1*scale, 2.5*scale, COL.white);
      drawPixelRect(cx+3*scale, cy+2, 4*scale, 3*scale, COL.white);
      drawPixelRect(cx+1.5*scale, cy+4*scale, 7.5*scale, 2*scale, COL.white);
      drawPixelRect(cx+0.5*scale, cy+6*scale, 9.5*scale, 2*scale, COL.offWhite);
      drawPixelRect(cx-0.3*scale, cy+8*scale, 11.5*scale, 2*scale, COL.offWhite);
      break;
    case 'rings':
      ctx.strokeStyle = COL.gold;
      ctx.lineWidth = scale;
      ctx.beginPath();
      ctx.arc(cx + 2*scale, cy + 3*scale, 2.5*scale, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx + 5*scale, cy + 3*scale, 2.5*scale, 0, Math.PI*2);
      ctx.stroke();
      break;
    case 'iron':
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1.1 * scale;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(cx + 3.5*scale, cy + 4*scale, 2*scale, Math.PI, 0);
      ctx.stroke();
      drawPixelRect(cx, cy+4*scale, 7*scale, 1*scale, COL.ironGray);
      drawPixelRect(cx, cy+5*scale, 8*scale, 1*scale, COL.ironGray);
      drawPixelRect(cx, cy+6*scale, 9*scale, 1*scale, COL.ironGray);
      drawPixelRect(cx+1*scale, cy+7*scale, 9*scale, 1*scale, '#999');
      break;
  }
  ctx.restore();
}

// ============================================================
// COMEDY POP-UPS
// ============================================================
let popup = null;
let popupTimer = 0;

function tPool(poolKey) {
  const pool = CONFIG.text[poolKey];
  const raw = pool[Math.random() * pool.length | 0];
  return raw.replace(/{player1}/g, CONFIG.player1Name).replace(/{player2}/g, CONFIG.player2Name);
}

const popupMessages = {
  firstMiss:    t('popupFirstMiss'),
  ironStun:     t('popupIronStun'),
  weddingDress: t('popupWeddingDress'),
  highMess:     t('popupHighMess'),
};

let shownPopups = {};
function showPopup(key) {
  if (key === 'combo5') {
    popup = tPool('popupCombo5Pool');
    popupTimer = 2.0;
    return;
  }
  if (key === 'combo10') {
    popup = tPool('popupCombo10Pool');
    popupTimer = 2.0;
    return;
  }
  if (shownPopups[key]) return;
  shownPopups[key] = true;
  popup = popupMessages[key];
  popupTimer = 2.0;
}

// ============================================================
// DIFFICULTY
// ============================================================
function getDifficulty() {
  const t = gameTime;
  return {
    throwInterval: Math.max(0.25, 1.2 - t * 0.015),
    fallSpeedMult: 1.0 + t * 0.015,
    saraSpeed: 60 + t * 1.5,
    doubleThrow: t > 30,
    tripleThrow: t > 60,
    specialChance: Math.min(0.3, t > 15 ? 0.05 + (t - 15) * 0.003 : 0),
  };
}

// ============================================================
// DRAW SARA
// ============================================================
function drawSara() {
  const isThrowing = saraThrowAnim > 0;
  const saraPhoto = isThrowing ? photoSprites.saraUp : photoSprites.saraDown;
  if (saraPhoto) {
    const boxW = isThrowing ? SARA_PHOTO_W : SARA_PHOTO_DOWN_W;
    const boxH = isThrowing ? SARA_PHOTO_H : SARA_PHOTO_DOWN_H;
    const px = saraX - boxW / 2;
    const photoBottomY = 16;
    const py = isThrowing ? photoBottomY : (photoBottomY + Math.abs(SARA_PHOTO_H - SARA_PHOTO_DOWN_H)+1);
    drawPhotoFitted(saraPhoto, px, py, boxW, boxH, SARA_PHOTO_BRIGHTNESS);
  }
}

function drawPhotoFitted(img, x, y, boxW, boxH, brightness) {
  const iw = img.width || 1;
  const ih = img.height || 1;
  const fit = Math.min(boxW / iw, boxH / ih);
  const dw = Math.max(1, Math.round(iw * fit));
  const dh = Math.max(1, Math.round(ih * fit));
  const dx = Math.round(x + (boxW - dw) / 2);
  const dy = Math.round(y + (boxH - dh) / 2);

  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.filter = 'brightness(' + (brightness || 1) + ')';
  ctx.drawImage(img, dx, dy, dw, dh);
  ctx.restore();
}

function drawPhotoFittedBottom(img, x, y, boxW, boxH) {
  const iw = img.width || 1;
  const ih = img.height || 1;
  const fit = Math.min(boxW / iw, boxH / ih);
  const dw = Math.max(1, Math.round(iw * fit));
  const dh = Math.max(1, Math.round(ih * fit));
  const dx = Math.round(x + (boxW - dw) / 2);
  const dy = Math.round(y + boxH - dh);

  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, dx, dy, dw, dh);
  ctx.restore();
}

// ============================================================
// DRAW GIDEON (split into body and basket for layering)
// ============================================================
let gideonBasketY = 0; // Store basket Y for later drawing

function drawGideonBody() {
  let by = GIDEON_Y + GIDEON_BASKET_OFFSET_Y;

  // Stun effect
  if (stunTimer > 0) {
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(stunTimer * 20);
  }

  // Body (drawn first, photo only)
  if (photoSprites.gideon) {
    const px = gideonX - GIDEON_PHOTO_W / 2;
    const py = GIDEON_Y + GIDEON_H - GIDEON_PHOTO_H;
    drawPhotoFittedBottom(photoSprites.gideon, px, py, GIDEON_PHOTO_W, GIDEON_PHOTO_H);
    by = py + Math.round(GIDEON_PHOTO_H * GIDEON_BASKET_REL_Y);
  }

  gideonBasketY = by;

  if (stunTimer > 0) {
    // Stun stars
    ctx.fillStyle = COL.gold;
    const t = performance.now() / 200;
    for (let i = 0; i < 3; i++) {
      const angle = t + i * 2.1;
      const sx = gideonX + Math.cos(angle) * 20;
      const sy = GIDEON_Y - 5 + Math.sin(angle) * 8;
      ctx.fillText('★', sx, sy);
    }
    ctx.globalAlpha = 1;
  }
}

function drawGideonBasket() {
  const bx = gideonX - BASKET_W / 2 + BASKET_X_OFFSET;
  // Basket (drawn on top, covering items)
  drawPixelChar(bx, gideonBasketY, basketSprite, basketPalette, BASKET_SCALE);
}

// DRAW FLOOR MESS
// ============================================================
function drawFloorMess() {
  for (const fi of floorItems) {
    const def = ITEM_TYPES[fi.type];
    const cx = fi.x + def.w;
    const cy = fi.y + def.h;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(fi.rotation);
    ctx.translate(-cx, -cy);
    drawItem(fi.x, fi.y, fi.type, 2);
    ctx.restore();
  }
}

function drawHUD() {
  ctx.font = '16px monospace';
  ctx.textAlign = 'left';

  ctx.fillText(t('hudScore') + score, 10, 19);

  // High score — two stacked lines right-aligned when remote is active

  ctx.fillStyle = COL.darkGreen;

    ctx.fillStyle = COL.ironGray;

  } else {
    ctx.font = '16px monospace';
    ctx.fillText(t('hudBest') + highScore, W - 10, 20);
  }

  // Multiplier
  if (multiplier > 1) {
    ctx.textAlign = 'center';
    ctx.fillStyle = COL.gold;
    ctx.font = 'bold 18px monospace';
    ctx.fillText('x' + multiplier + '!', W / 2, 20);
    ctx.font = '16px monospace';
  }

  // Mess meter bar
  ctx.textAlign = 'left';
  const barX = 10, barY = 30, barW = 100, barH = 10;
  ctx.strokeStyle = COL.darkGreen;
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  const pct = messCount / MESS_MAX;
  ctx.fillStyle = pct > 0.7 ? COL.red : pct > 0.4 ? COL.gold : COL.sage;
  ctx.fillRect(barX + 1, barY + 1, (barW - 2) * pct, barH - 2);
  ctx.fillStyle = COL.darkGreen;
  ctx.font = '9px monospace';
  ctx.fillText(t('hudMess'), barX, barY + barH + 10);
}

// ============================================================
// DRAW POP-UP
// ============================================================
function drawPopup() {
  if (popup && popupTimer > 0) {
    ctx.save();
    const alpha = Math.min(1, popupTimer * 2);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    const tw = ctx.measureText(popup).width;
    const px = W / 2, py = H / 2 - 80;
    // Bubble
    ctx.fillStyle = COL.offWhite;
    const pad = 10;
    ctx.beginPath();
    roundRect(ctx, px - tw/2 - pad, py - 14, tw + pad*2, 28, 6);
    ctx.fill();
    ctx.strokeStyle = COL.darkGreen;
    ctx.lineWidth = 2;
    ctx.beginPath();
    roundRect(ctx, px - tw/2 - pad, py - 14, tw + pad*2, 28, 6);
    ctx.stroke();
    ctx.fillStyle = COL.darkGreen;
    ctx.fillText(popup, px, py + 5);
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

function drawMuteBtn() {

function checkMuteClick(px, py) {
  if (px >= muteBtn.x && px <= muteBtn.x + muteBtn.w &&
      py >= muteBtn.y && py <= muteBtn.y + muteBtn.h) {
    muted = !muted;
    saveMute();
    if (muted) stopMusic(); else if (state === STATE.PLAYING) startMusic();
    return true;
  }
  return false;
}

const LB_PAGE_SIZE = 10;
const LB_MAX = 50;

function drawLeaderboard() {
  drawBackground(false);
  ctx.fillStyle = 'rgba(244,240,235,0.97)';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = COL.darkGreen;
  ctx.font = 'bold 22px monospace';
  ctx.fillText('🏆 Topplista', W/2, 44);

  const top50 = leaderboard.slice(0, LB_MAX);
  const totalPages = Math.max(1, Math.ceil(top50.length / LB_PAGE_SIZE));
  if (leaderboardPage >= totalPages) leaderboardPage = 0;
  const startIdx = leaderboardPage * LB_PAGE_SIZE;
  const rows = top50.slice(startIdx, startIdx + LB_PAGE_SIZE);

  const panelX = 20, panelY = 56, panelW = W - 40, rowH = 26;
  const panelH = LB_PAGE_SIZE * rowH + 16; // fixed height for 10 rows

  // Panel background
  ctx.fillStyle = 'rgba(233,223,210,0.93)';
  ctx.beginPath(); roundRect(ctx, panelX, panelY, panelW, panelH, 8); ctx.fill();
  ctx.strokeStyle = COL.darkGreen; ctx.lineWidth = 2;

  if (top50.length === 0) {
    ctx.font = '13px monospace'; ctx.fillStyle = '#888';
    ctx.textBaseline = 'middle';
    ctx.fillText('Inga resultat ännu!', W/2, panelY + panelH / 2);
    ctx.textBaseline = 'alphabetic';
  } else {
    ctx.textBaseline = 'middle';
    for (let i = 0; i < rows.length; i++) {
      const rank = startIdx + i;
      const y = panelY + 8 + i * rowH + rowH / 2;
      const isMe = playerName && rows[i].name.toLowerCase() === playerName.toLowerCase();

      if (isMe) {
        ctx.fillStyle = 'rgba(212,160,23,0.18)';
        ctx.fillRect(panelX + 2, panelY + 8 + i * rowH, panelW - 4, rowH);
      }

      const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : rank === 2 ? '🥉' : (rank + 1) + '.';
      ctx.textAlign = 'left';
      ctx.font = rank < 3 ? 'bold 13px monospace' : '12px monospace';
      ctx.fillStyle = isMe ? COL.gold : COL.darkGreen;
      ctx.fillText(medal, panelX + 8, y);

      // Name (clipped so it doesn't overlap score)
      ctx.save();
      ctx.beginPath(); ctx.rect(panelX + 38, panelY, panelW - 90, panelH); ctx.clip();
      ctx.fillText(rows[i].name, panelX + 38, y);
      ctx.restore();

      ctx.textAlign = 'right';
      ctx.fillText(rows[i].score, panelX + panelW - 8, y);
    }
    ctx.textBaseline = 'alphabetic';
  }

  // Scroll buttons
  const navY = panelY + panelH + 12;
  const btnW = 52, btnH = 24;
  const upX = W / 2 - btnW - 4, downX = W / 2 + 4;
  leaderboardUpBtn   = { x: upX,   y: navY, w: btnW, h: btnH };
  leaderboardDownBtn = { x: downX, y: navY, w: btnW, h: btnH };

  function navBtn(x, label, disabled) {
    ctx.fillStyle = disabled ? 'rgba(180,180,180,0.25)' : 'rgba(55,78,46,0.88)';
    ctx.beginPath(); roundRect(ctx, x, navY, btnW, btnH, 5); ctx.fill();
    ctx.fillStyle = disabled ? '#bbb' : COL.offWhite;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, x + btnW / 2, navY + btnH / 2 + 1);
    ctx.textBaseline = 'alphabetic';
  }
  navBtn(upX,   '▲ Upp', leaderboardPage === 0);
  navBtn(downX, '▼ Ned', leaderboardPage >= totalPages - 1);

  // Page indicator
  ctx.font = '11px monospace'; ctx.fillStyle = '#666'; ctx.textAlign = 'center';
  ctx.fillText('Sida ' + (leaderboardPage + 1) + ' / ' + totalPages + '  (' + top50.length + ' resultat)', W/2, navY + btnH + 14);

  // Back button
  const bbY = navY + btnH + 30;
  leaderboardBackBtn = { x: W/2 - 60, y: bbY, w: 120, h: 30 };
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.beginPath(); roundRect(ctx, W/2 - 58, bbY + 2, 120, 30, 7); ctx.fill();
  ctx.fillStyle = COL.rose;
  ctx.beginPath(); roundRect(ctx, W/2 - 60, bbY, 120, 30, 7); ctx.fill();
  ctx.strokeStyle = COL.darkGreen; ctx.lineWidth = 2;
  ctx.beginPath(); roundRect(ctx, W/2 - 60, bbY, 120, 30, 7); ctx.stroke();
  ctx.fillStyle = COL.darkGreen; ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('← Tillbaka', W/2, bbY + 16);
  ctx.textBaseline = 'alphabetic';

  drawMuteBtn();
}

function drawTitleLegend() {

  ctx.save();

  ctx.lineWidth = 2;
  ctx.beginPath();
  roundRect(ctx, boxX, boxY, boxW, boxH, 8);
  ctx.stroke();

  ctx.textBaseline = 'middle';
  ctx.fillStyle = COL.darkGreen;

  // Header
  ctx.textAlign = 'center';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(t('legendHeader'), boxX + boxW / 2, boxY + 17);
  ctx.strokeStyle = '#cdbfae';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(boxX + 10, boxY + 24);
  ctx.lineTo(boxX + boxW - 10, boxY + 26);
  ctx.stroke();

  // Regular clothes row
  ctx.textAlign = 'center';
  ctx.font = 'bold 11px monospace';
  const centerX = boxX + boxW / 2;
  const regularLabelY = boxY + 38;
  ctx.fillText(t('regularClothes'), centerX, regularLabelY);

  const row1Y = boxY + 58;
  const row2Y = boxY + 80;
  const stepX = 42;
  const row1Count = Math.min(4, regularTypes.length);
  const row2Count = Math.max(0, regularTypes.length - row1Count);
  const row1StartX = centerX - ((row1Count - 1) * stepX) / 2;
  const row2StartX = centerX - ((row2Count - 1) * stepX) / 2;
  for (let i = 0; i < regularTypes.length; i++) {
    const type = regularTypes[i];
    const rowY = i < 4 ? row1Y : row2Y;
    const col = i < 4 ? i : i - 4;
    const rowStartX = i < 4 ? row1StartX : row2StartX;
    const iconScale = 2;
    const iconTop = rowY - (ITEM_TYPES[type].legendIconH * iconScale) / 2;
    drawItem(rowStartX + col * stepX, iconTop, type, iconScale);
  }

  // Special effects list
  ctx.font = '11px monospace';
  for (let i = 0; i < specialTypes.length; i++) {
    const type = specialTypes[i];
    const rowY = boxY + 108 + i * 18;
    const text = ITEM_TYPES[type].legendText;
    const textW = ctx.measureText(text).width;
    const iconTextGap = 26;
    const lineStartX = centerX - (iconTextGap + textW) / 2;
    const rowShiftX = type === 'weddingDress' ? -4 : 0;
    const iconLift = type === 'weddingDress' ? 7 : 0;
    const textLift = type === 'weddingDress' ? 2 : 0;
    drawItem(lineStartX + rowShiftX, rowY - 8 - iconLift, type, 2);
    ctx.textAlign = 'left';
    ctx.fillText(text, lineStartX + iconTextGap + rowShiftX, rowY + 2 - textLift);
    ctx.textAlign = 'center';
  }
  ctx.restore();
}

  localHighScore = 0;

function checkTitleClick(px, py) {
  const lbY2 = 556, lbH = 26;
  // Leaderboard button
  if (px >= W/2 - 72 && px <= W/2 + 72 && py >= lbY2 && py <= lbY2 + lbH) {
    leaderboardPage = 0;
    state = STATE.LEADERBOARD;
    return;
  }
  // Clear local button (lower-left square icon)
  if (px >= 6 && px <= 26 && py >= H - 24 && py <= H - 4) {
    clearLocalScores();
    return;
  }
  // Anywhere else → start game
  resetGame();
}

function checkGameOverClick(px, py) {
  if (px >= gameOverButtons.playAgain.x && px <= gameOverButtons.playAgain.x + gameOverButtons.playAgain.w &&
      py >= gameOverButtons.playAgain.y && py <= gameOverButtons.playAgain.y + gameOverButtons.playAgain.h) {
    resetGame();
    return true;
  }
  if (px >= gameOverButtons.mainMenu.x && px <= gameOverButtons.mainMenu.x + gameOverButtons.mainMenu.w &&
      py >= gameOverButtons.mainMenu.y && py <= gameOverButtons.mainMenu.y + gameOverButtons.mainMenu.h) {
    state = STATE.TITLE;
    stopMusic();
    return true;
  }
  const lb = gameOverButtons.leaderboard;
  if (lb && px >= lb.x && px <= lb.x + lb.w && py >= lb.y && py <= lb.y + lb.h) {
    leaderboardPage = 0;
    state = STATE.LEADERBOARD;
    return true;
  }
  return false;
}

function resetGame() {
  score = 0;
  messCount = 0;
  gameTime = 0;
  multiplier = 1;
  multiplierTimer = 0;
  stunTimer = 0;
  combo = 0;
  maxCombo = 0;
  newRecord = false;
  newGlobalRecord = false;
  newPersonalRecord = false;
  prevHighScore = 0;
  floorItems = [];
  particles = [];
  popup = null;
  popupTimer = 0;
  shownPopups = {};
  saraX = W / 2;
  saraTargetX = W / 2;
  saraMoveTimer = 0;
  saraThrowTimer = 0.5;
  saraThrowAnim = 0;
  gideonX = W / 2;
  state = STATE.PLAYING;
  startMusic();
}

// ============================================================
// UPDATE GAME
// ============================================================
function updateGame(dt) {
  gameTime += dt;
  const diff = getDifficulty();

  // Multiplier timer
  if (multiplierTimer > 0) {
    multiplierTimer -= dt;
    if (multiplierTimer <= 0) { multiplier = 1; multiplierTimer = 0; }
  }

  // Stun timer
  if (stunTimer > 0) {
    stunTimer -= dt;
    if (stunTimer < 0) stunTimer = 0;
  }

  // Popup timer
  if (popupTimer > 0) {
    popupTimer -= dt;
    if (popupTimer <= 0) { popup = null; }
  }

  // Sara movement
  saraMoveTimer -= dt;
  if (saraMoveTimer <= 0) {
    saraTargetX = 40 + Math.random() * (W - 80);
    saraMoveTimer = 1.0 + Math.random() * 1.5;
  }
  const saraDx = saraTargetX - saraX;
  saraX += saraDx * Math.min(1, dt * diff.saraSpeed / 30);

  // Sara throw
  saraThrowTimer -= dt;
  saraThrowAnim = Math.max(0, saraThrowAnim - dt);
  if (saraThrowTimer <= 0) {
    saraThrowTimer = diff.throwInterval;
    saraThrowAnim = 0.3;

    // Choose item type
    let type;
    if (Math.random() < diff.specialChance) {
      type = specialTypes[Math.random() * specialTypes.length | 0];
    } else {
      type = regularTypes[Math.random() * regularTypes.length | 0];
    }
    spawnItem(type, saraX);

    // Double/triple throw
    if (diff.doubleThrow && Math.random() < 0.4) {
      const type2 = regularTypes[Math.random() * regularTypes.length | 0];
      setTimeout(() => { if (state === STATE.PLAYING) spawnItem(type2, saraX); }, 150);
    }
    if (diff.tripleThrow && Math.random() < 0.2) {
      const type3 = regularTypes[Math.random() * regularTypes.length | 0];
      setTimeout(() => { if (state === STATE.PLAYING) spawnItem(type3, saraX); }, 300);
    }
  }

  // Move Gideon (follow pointer)
  if (stunTimer <= 0) {
    const targetX = Math.max(BASKET_W/2, Math.min(W - BASKET_W/2, pointerX));
    gideonX += (targetX - gideonX) * Math.min(1, dt * 12);
  }

  // Update items
  const basketTop = GIDEON_Y + GIDEON_BASKET_OFFSET_Y;
  const basketBot = basketTop + BASKET_H;
  const basketLeft = gideonX - BASKET_W / 2 + BASKET_X_OFFSET + 6;
  const basketRight = gideonX + BASKET_W / 2 + BASKET_X_OFFSET - 6;

  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.vy += 200 * dt * diff.fallSpeedMult;
    it.x += it.vx * dt;
    it.y += it.vy * dt;
    it.rotation += it.rotSpeed * dt;

    // Keep in bounds horizontally
    if (it.x < 0) { it.x = 0; it.vx *= -0.5; }
    if (it.x + it.w > W) { it.x = W - it.w; it.vx *= -0.5; }

    // Check catch (basket collision)
    const itemCX = it.x + it.w / 2;
    const itemBot = it.y + it.h;
    if (itemBot >= basketTop && it.y <= basketBot &&
        itemCX >= basketLeft && itemCX <= basketRight && it.vy > 0) {
      // Caught!
      items.splice(i, 1);

      if (it.type === 'iron') {
        stunTimer = CONFIG.scoring.ironStunDuration;
        sfxIron();
        showPopup('ironStun');
        combo = 0;
        spawnParticles(gideonX, basketTop, '#888', 8);
      } else if (it.type === 'rings') {
        multiplier = CONFIG.scoring.ringsMultiplier;
        multiplierTimer = CONFIG.scoring.ringsDuration;
        score += it.points * multiplier;
        sfxRings();
        combo++;
        spawnParticles(itemCX, basketTop, COL.gold, 12);
      } else if (it.type === 'weddingDress') {
        score += it.points * multiplier;
        sfxWeddingDress();
        showPopup('weddingDress');
        combo++;
        spawnParticles(itemCX, basketTop, COL.offWhite, 15);
      } else {
        score += it.points * multiplier;
        sfxCatch();
        combo++;
        spawnParticles(itemCX, basketTop, COL.sage, 6);
      }

      if (combo === 5) showPopup('combo5');
      if (combo === 10) showPopup('combo10');
      if (combo > maxCombo) maxCombo = combo;
      continue;
    }

    // Check floor
    if (it.y + it.h >= H - 15) {
      items.splice(i, 1);
      if (it.type === 'iron') {
        // Iron on floor is ok; no penalty
        continue;
      }
      // Missed
      floorItems.push({
        x: it.x,
        y: H - 50 - it.h * 0.7 + Math.random() * 5,
        type: it.type,
        rotation: (Math.random() < 0.5 ? 1 : -1) * (Math.PI / 4 + Math.random() * Math.PI * 7 / 4),
      });
      messCount++;
      combo = 0;
      sfxDrop();

      if (messCount === 1) showPopup('firstMiss');
      if (messCount === Math.floor(MESS_MAX * 0.7)) showPopup('highMess');

      if (messCount >= MESS_MAX) {
        // Game over
        stopMusic();
        sfxGameOver();
        newGlobalRecord = false;
        newPersonalRecord = false;
        const globalBest = remoteHighScore > 0 ? remoteHighScore : localHighScore;
        if (score > globalBest) {
          // Beat the global record (or local-only best when no remote)
          prevHighScore = globalBest;
          prevLocalHighScore = localHighScore;
          newGlobalRecord = true;
          newRecord = true;
          highScore = score;
          remoteHighScore = remoteHighScore > 0 ? score : 0; // keep remote in sync
          saveHighScore();
          localHighScore = score;
        } else if (score > localHighScore) {
          // Beat personal best but not global
          prevLocalHighScore = localHighScore;
          newPersonalRecord = true;
          newRecord = false;
          localHighScore = score;
          try { localStorage.setItem('gtn_highscore', localHighScore); } catch(e) {}
        } else {
          newRecord = false;
        }
        // If new record, prompt for name then submit to leaderboard
        if (newGlobalRecord || newPersonalRecord) {
          const finalScore = score;
          const reason = newGlobalRecord
            ? '🏆 Nytt globalt rekord! (' + finalScore + ' p)'
            : '⭐ Nytt personligt rekord! (' + finalScore + ' p)';
          state = STATE.GAME_OVER; // stop the game loop before overlay
          showNameOverlay(reason, function(name) {
            submitToLeaderboard(name, finalScore);
          });
        } else {
          state = STATE.GAME_OVER;
        }
        return;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 150 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
// RENDER GAME
// ============================================================
function renderGame() {
  drawBackground();
  drawFloorMess();

  // Draw particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.5);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  drawSara();
  drawGideonBody();

  // Draw items (in front of Gideon body, behind basket)
  for (const it of items) {
    drawItem(it.x, it.y, it.type, 2);
  }

  drawGideonBasket();
  drawHUD();
  drawPopup();
  drawMuteBtn();
}

// ============================================================
// RESIZE
// ============================================================
function resize() {
  const parent = canvas.parentElement;
  const pw = parent.clientWidth || window.innerWidth;
  const ph = parent.clientHeight || window.innerHeight;
  const scale = Math.min(pw / W, ph / H);
  const deviceScale = window.devicePixelRatio || 1;
  const blendedScale = scale > 1 ? 1 + (scale - 1) * 0.5 : scale;
  renderDpr = Math.min(blendedScale * deviceScale, 4);

  // Use a midpoint between plain device-pixel rendering and full CSS-scale matching
  // so large screens look sharper without pushing the canvas to the maximum size.
  canvas.width = Math.round(W * renderDpr);
  canvas.height = Math.round(H * renderDpr);
  ctx.setTransform(renderDpr, 0, 0, renderDpr, 0, 0);

  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  if (state === STATE.TITLE) {
    drawTitle();
    if (clicked) {
      clicked = false;
      checkTitleClick(clickX, clickY);
    }
  } else if (state === STATE.PLAYING) {
    updateGame(dt);
    renderGame();
    clicked = false;
  } else if (state === STATE.GAME_OVER) {
    drawGameOver();
    if (clicked) {
      clicked = false;
      checkGameOverClick(clickX, clickY);
    }
  } else if (state === STATE.LEADERBOARD) {
    drawLeaderboard();
    if (clicked) {
      clicked = false;
      const b = leaderboardBackBtn;
      if (clickX >= b.x && clickX <= b.x + b.w && clickY >= b.y && clickY <= b.y + b.h) {
        state = STATE.TITLE;
      } else {
        const top50 = leaderboard.slice(0, LB_MAX);
        const totalPages = Math.max(1, Math.ceil(top50.length / LB_PAGE_SIZE));
        const u = leaderboardUpBtn, d = leaderboardDownBtn;
        if (clickX >= u.x && clickX <= u.x + u.w && clickY >= u.y && clickY <= u.y + u.h) {
          if (leaderboardPage > 0) leaderboardPage--;
        } else if (clickX >= d.x && clickX <= d.x + d.w && clickY >= d.y && clickY <= d.y + d.h) {
          if (leaderboardPage < totalPages - 1) leaderboardPage++;
        }
      }
    }
  }
}

requestAnimationFrame(gameLoop);
</script>
