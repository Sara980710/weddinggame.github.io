// AUDIO ENGINE (procedural, Web Audio API)
// ============================================================
let audioCtx = null;
let muted = false;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol, ramp) {
  if (muted || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (ramp) o.frequency.linearRampToValueAtTime(ramp, audioCtx.currentTime + duration);
  g.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + duration);
}

function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height)
  };
}

canvas.addEventListener('mousemove', e => {
  const p = getCanvasPos(e.clientX, e.clientY);
  pointerX = p.x;

});

});

function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function drawPixelChar(x, y, pixels, palette, scale) {
  scale = scale || 1;
  for (let row = 0; row < pixels.length; row++) {
    for (let col = 0; col < pixels[row].length; col++) {
      const c = pixels[row][col];
      if (c !== 0 && palette[c]) {
        ctx.fillStyle = palette[c];
        ctx.fillRect(Math.round(x + col * scale), Math.round(y + row * scale), scale, scale);
      }
    }
  }
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function loadImageCandidates(sources) {
  let idx = 0;
  function next() {
    if (idx >= sources.length) return Promise.reject(new Error('no image candidates found'));
    const src = sources[idx++];
    return loadImage(src).catch(next);
  }
  return next();
}

function avgCornerColor(data, w, h, sx, sy, size) {
  let r = 0, g = 0, b = 0, n = 0;
  for (let y = sy; y < sy + size; y++) {
    for (let x = sx; x < sx + size; x++) {
      const i = (y * w + x) * 4;
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
      n++;
    }
  }
  return { r: r / n, g: g / n, b: b / n };
}

function preprocessCharacterImage(img, maxDim, threshold) {
  const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
  const w = Math.max(1, Math.round(img.naturalWidth * scale));
  const h = Math.max(1, Math.round(img.naturalHeight * scale));

  const base = document.createElement('canvas');
  base.width = w;
  base.height = h;
  const bctx = base.getContext('2d', { willReadFrequently: true });
  bctx.drawImage(img, 0, 0, w, h);

  const imageData = bctx.getImageData(0, 0, w, h);
  const d = imageData.data;
  let hasTransparency = false;
  for (let i = 3; i < d.length; i += 4) {
    if (d[i] < 250) {
      hasTransparency = true;
      break;
    }
  }

  let corners = null;
  if (!hasTransparency) {
    const sample = Math.max(6, Math.floor(Math.min(w, h) * 0.06));
    corners = [
      avgCornerColor(d, w, h, 0, 0, sample),
      avgCornerColor(d, w, h, w - sample, 0, sample),
      avgCornerColor(d, w, h, 0, h - sample, sample),
      avgCornerColor(d, w, h, w - sample, h - sample, sample),
    ];
  }

  let minX = w, minY = h, maxX = -1, maxY = -1;
  const t2 = threshold * threshold;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      const a = d[i + 3];
      let keep = a > 24;

      if (!hasTransparency && keep) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        for (const c of corners) {
          const dr = r - c.r;
          const dg = g - c.g;
          const db = b - c.b;
          if (dr * dr + dg * dg + db * db <= t2) {
            keep = false;
            break;
          }
        }

        // Drop very bright backdrop leftovers.
        if (keep && r > 240 && g > 240 && b > 240) keep = false;
      }

      if (!keep) {
        d[i + 3] = 0;
      } else {
        if (!hasTransparency) d[i + 3] = 255;
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }

  bctx.putImageData(imageData, 0, 0);
  if (maxX < minX || maxY < minY) return base;

  const pad = 3;
  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(w - 1, maxX + pad);
  maxY = Math.min(h - 1, maxY + pad);

  const tw = maxX - minX + 1;
  const th = maxY - minY + 1;
  const trimmed = document.createElement('canvas');
  trimmed.width = tw;
  trimmed.height = th;
  const tctx = trimmed.getContext('2d');
  tctx.drawImage(base, minX, minY, tw, th, 0, 0, tw, th);
  return trimmed;
}

function drawItem(x, y, type, scale) {
  scale = scale || 2;
  const cx = Math.round(x);
  const cy = Math.round(y);
  ctx.save();
  switch(type) {
    case 'sock':
      // Pair of socks: shaft has constant width, foot/toe section flares outward.
      drawPixelRect(cx, cy + 1*scale, 3*scale, 6*scale, COL.offWhite);
      drawPixelRect(cx, cy + 1*scale, 3*scale, 2*scale, COL.sage);
      drawPixelRect(cx - 1*scale, cy + 6*scale, 4*scale, 2*scale, COL.offWhite);
      drawPixelRect(cx + 1*scale, cy + 3*scale, 1*scale, 4*scale, '#e8e8e8');

      drawPixelRect(cx + 4*scale, cy + 1*scale, 3*scale, 6*scale, COL.offWhite);
      drawPixelRect(cx + 4*scale, cy + 1*scale, 3*scale, 2*scale, COL.sage);
      drawPixelRect(cx + 4*scale, cy + 6*scale, 4*scale, 2*scale, COL.offWhite);
      drawPixelRect(cx + 5*scale, cy + 3*scale, 1*scale, 4*scale, '#e8e8e8');
      break;
    case 'dress':
      drawPixelRect(cx + 3*scale, cy, 3*scale, 2*scale, COL.darkRose);
      drawPixelRect(cx + 2*scale, cy + 2*scale, 5*scale, 2*scale, COL.rose);
      drawPixelRect(cx + 1*scale, cy + 4*scale, 7*scale, 2*scale, COL.rose);
      drawPixelRect(cx, cy + 6*scale, 9*scale, 4*scale, COL.rose);
      drawPixelRect(cx + 4*scale, cy + 3*scale, 1*scale, 7*scale, COL.darkRose);
      drawPixelRect(cx + 2*scale, cy + 6*scale, 1*scale, 4*scale, COL.darkRose);
      drawPixelRect(cx + 6*scale, cy + 6*scale, 1*scale, 4*scale, COL.darkRose);
      break;
    case 'shoe':
      drawPixelRect(cx + 1*scale, cy + 3*scale, 7*scale, 3*scale, '#3a2d24');
      drawPixelRect(cx + 5*scale, cy + 2*scale, 2*scale, 1*scale, '#3a2d24');

    case 'tshirt':

      drawPixelRect(cx + 1*scale, cy + 2*scale, 6*scale, 6*scale, COL.sage);
      drawPixelRect(cx, cy + 2*scale, 2*scale, 3*scale, COL.darkGreen);

    case 'towel':
      drawPixelRect(cx, cy, 7*scale, 9*scale, COL.offWhite);
      drawPixelRect(cx, cy, 7*scale, 1*scale, COL.rose);
      drawPixelRect(cx, cy + 8*scale, 7*scale, 1*scale, COL.rose);

      drawPixelRect(cx+1*scale, cy+4*scale, 8*scale, 5*scale, COL.white);
      drawPixelRect(cx, cy+6*scale, 10*scale, 5*scale, COL.offWhite);
      drawPixelRect(cx+4*scale, cy+2*scale, 2*scale, 1*scale, COL.gold);

      if (Math.random() > 0.5) {
        ctx.fillStyle = COL.gold;
        const sx = cx + (Math.random()*8|0)*scale;
        const sy = cy + (Math.random()*10|0)*scale;
        ctx.fillRect(sx, sy, scale, scale);
      }

    case 'rings':
      ctx.strokeStyle = COL.gold;
      ctx.lineWidth = scale;
      ctx.beginPath();
      ctx.arc(cx + 2*scale, cy + 3*scale, 2.5*scale, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx + 5*scale, cy + 3*scale, 2.5*scale, 0, Math.PI*2);
      ctx.stroke();
      // shine
      ctx.fillStyle = COL.gold;
      ctx.fillRect(cx + 1*scale, cy + 1*scale, scale, scale);
      break;
    case 'iron':
      drawPixelRect(cx+1*scale, cy, 2*scale, 3*scale, '#555');
      drawPixelRect(cx, cy+3*scale, 8*scale, 4*scale, COL.ironGray);
      drawPixelRect(cx+1*scale, cy+7*scale, 6*scale, 1*scale, '#999');
      drawPixelRect(cx+2*scale, cy+1*scale, 1*scale, 1*scale, COL.red);
      break;

  ctx.restore();
}

function getDifficulty() {
  const t = gameTime;
  return {
    throwInterval: Math.max(0.25, 1.2 - t * 0.015),
    fallSpeedMult: 1.0 + t * 0.015,
    saraSpeed: 60 + t * 1.5,

}

// ============================================================
function drawSara() {
  const sx = saraX - SARA_W / 2;
  const sy = 15;
  const isThrowing = saraThrowAnim > 0;
  const saraPhoto = isThrowing ? photoSprites.saraUp : photoSprites.saraDown;
  if (saraPhoto) {
    const boxW = isThrowing ? SARA_PHOTO_W : SARA_PHOTO_DOWN_W;
    const boxH = isThrowing ? SARA_PHOTO_H : SARA_PHOTO_DOWN_H;
    const px = saraX - boxW / 2;
    const py = isThrowing ? 6 : 12;
    drawPhotoFitted(saraPhoto, px, py, boxW, boxH, SARA_PHOTO_BRIGHTNESS);
    return;
  }
  const sprite = isThrowing ? saraThrowSprite : saraSprite;
  drawPixelChar(sx, sy, sprite, saraPalette, SARA_SCALE);
}

function drawPhotoFitted(img, x, y, boxW, boxH, brightness) {
  const iw = img.width || 1;
  const ih = img.height || 1;
  const fit = Math.min(boxW / iw, boxH / ih);
  const dw = Math.max(1, Math.round(iw * fit));
  const dh = Math.max(1, Math.round(ih * fit));
  const dx = Math.round(x + (boxW - dw) / 2);
  const dy = Math.round(y + (boxH - dh) / 2);

  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.filter = 'brightness(' + (brightness || 1) + ')';
  ctx.drawImage(img, dx, dy, dw, dh);
  ctx.restore();
}

function drawPhotoFittedBottom(img, x, y, boxW, boxH) {
  const iw = img.width || 1;
  const ih = img.height || 1;
  const fit = Math.min(boxW / iw, boxH / ih);
  const dw = Math.max(1, Math.round(iw * fit));
  const dh = Math.max(1, Math.round(ih * fit));
  const dx = Math.round(x + (boxW - dw) / 2);
  const dy = Math.round(y + boxH - dh);

  ctx.save();
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, dx, dy, dw, dh);
  ctx.restore();
}

  const gx = gideonX - GIDEON_W / 2;

    drawPhotoFittedBottom(photoSprites.gideon, px, py, GIDEON_PHOTO_W, GIDEON_PHOTO_H);
    by = py + Math.round(GIDEON_PHOTO_H * GIDEON_BASKET_REL_Y);
  } else {
    drawPixelChar(gx, GIDEON_Y, gideonSprite, gideonPalette, GIDEON_SCALE);
    by = GIDEON_Y + Math.round(GIDEON_H * GIDEON_BASKET_REL_Y);
  }

  // Basket (drawn on top, covering legs)
  drawPixelChar(bx, by, basketSprite, gideonPalette, BASKET_SCALE);

  if (stunTimer > 0) {
    // Stun stars
    ctx.fillStyle = COL.gold;
    const t = performance.now() / 200;
    for (let i = 0; i < 3; i++) {
      const angle = t + i * 2.1;
      const sx = gideonX + Math.cos(angle) * 20;
      const sy = GIDEON_Y - 5 + Math.sin(angle) * 8;
      ctx.fillText('★', sx, sy);
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAW POP-UP
// ============================================================
function drawPopup() {
  if (popup && popupTimer > 0) {
    ctx.save();
    const alpha = Math.min(1, popupTimer * 2);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    const tw = ctx.measureText(popup).width;
    const px = W / 2, py = H / 2 - 80;
    // Bubble
    ctx.fillStyle = COL.offWhite;
    const pad = 10;
    ctx.beginPath();
    roundRect(ctx, px - tw/2 - pad, py - 14, tw + pad*2, 28, 6);
    ctx.fill();
    ctx.strokeStyle = COL.darkGreen;
    ctx.lineWidth = 2;
    ctx.beginPath();
    roundRect(ctx, px - tw/2 - pad, py - 14, tw + pad*2, 28, 6);
    ctx.stroke();
    ctx.fillStyle = COL.darkGreen;
    ctx.fillText(popup, px, py + 5);
    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

function checkMuteClick(px, py) {
  if (px >= muteBtn.x && px <= muteBtn.x + muteBtn.w &&
      py >= muteBtn.y && py <= muteBtn.y + muteBtn.h) {
    muted = !muted;
    saveMute();
    if (muted) stopMusic(); else if (state === STATE.PLAYING) startMusic();
    return true;
  }
  return false;
}

  ctx.fill();
  ctx.fillStyle = COL.offWhite;
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Spela igen', W/2, 386);

  drawMuteBtn();
}

// ============================================================
// GAME RESET
// ============================================================
function resetGame() {
  score = 0;
  messCount = 0;
  gameTime = 0;
  multiplier = 1;
  multiplierTimer = 0;
  stunTimer = 0;
  combo = 0;
  maxCombo = 0;
  newRecord = false;
  items = [];
  floorItems = [];
  particles = [];
  popup = null;
  popupTimer = 0;
  shownPopups = {};
  saraX = W / 2;
  saraTargetX = W / 2;
  saraMoveTimer = 0;
  saraThrowTimer = 0.5;
  saraThrowAnim = 0;
  gideonX = W / 2;
  state = STATE.PLAYING;
  startMusic();
}

// ============================================================
// UPDATE GAME
// ============================================================
function updateGame(dt) {
  gameTime += dt;
  const diff = getDifficulty();

  // Multiplier timer
  if (multiplierTimer > 0) {
    multiplierTimer -= dt;
    if (multiplierTimer <= 0) { multiplier = 1; multiplierTimer = 0; }
  }

  // Stun timer
  if (stunTimer > 0) {
    stunTimer -= dt;
    if (stunTimer < 0) stunTimer = 0;
  }

  // Popup timer
  if (popupTimer > 0) {
    popupTimer -= dt;
    if (popupTimer <= 0) { popup = null; }
  }

  // Sara movement
  saraMoveTimer -= dt;
  if (saraMoveTimer <= 0) {
    saraTargetX = 40 + Math.random() * (W - 80);
    saraMoveTimer = 1.0 + Math.random() * 1.5;
  }
  const saraDx = saraTargetX - saraX;
  saraX += saraDx * Math.min(1, dt * diff.saraSpeed / 30);

  // Sara throw
  saraThrowTimer -= dt;
  saraThrowAnim = Math.max(0, saraThrowAnim - dt);
  if (saraThrowTimer <= 0) {
    saraThrowTimer = diff.throwInterval;
    saraThrowAnim = 0.3;

    // Choose item type
    let type;
    if (Math.random() < diff.specialChance) {
      type = specialTypes[Math.random() * specialTypes.length | 0];
    } else {
      type = regularTypes[Math.random() * regularTypes.length | 0];
    }
    spawnItem(type, saraX);

    // Double/triple throw
    if (diff.doubleThrow && Math.random() < 0.4) {
      const type2 = regularTypes[Math.random() * regularTypes.length | 0];
      setTimeout(() => { if (state === STATE.PLAYING) spawnItem(type2, saraX); }, 150);
    }
    if (diff.tripleThrow && Math.random() < 0.2) {
      const type3 = regularTypes[Math.random() * regularTypes.length | 0];
      setTimeout(() => { if (state === STATE.PLAYING) spawnItem(type3, saraX); }, 300);
    }
  }

  // Move Gideon (follow pointer)
  if (stunTimer <= 0) {
    const targetX = Math.max(BASKET_W/2, Math.min(W - BASKET_W/2, pointerX));
    gideonX += (targetX - gideonX) * Math.min(1, dt * 12);
  }

  // Update items
  const basketTop = GIDEON_Y + GIDEON_BASKET_OFFSET_Y;
  const basketBot = basketTop + BASKET_H;
  const basketLeft = gideonX - BASKET_W / 2 + BASKET_X_OFFSET + 6;
  const basketRight = gideonX + BASKET_W / 2 + BASKET_X_OFFSET - 6;

  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.vy += 200 * dt * diff.fallSpeedMult;
    it.x += it.vx * dt;
    it.y += it.vy * dt;
    it.rotation += it.rotSpeed * dt;

    // Keep in bounds horizontally
    if (it.x < 0) { it.x = 0; it.vx *= -0.5; }
    if (it.x + it.w > W) { it.x = W - it.w; it.vx *= -0.5; }

    // Check catch (basket collision)
    const itemCX = it.x + it.w / 2;
    const itemBot = it.y + it.h;
    if (itemBot >= basketTop && it.y <= basketBot &&
        itemCX >= basketLeft && itemCX <= basketRight && it.vy > 0) {
      // Caught!
      items.splice(i, 1);

      if (it.type === 'iron') {
        stunTimer = 1.5;
        sfxIron();
        showPopup('ironStun');
        combo = 0;
        spawnParticles(gideonX, basketTop, '#888', 8);
      } else if (it.type === 'rings') {
        multiplier = 2;
        multiplierTimer = 5;
        score += it.points * multiplier;
        sfxRings();
        combo++;
        spawnParticles(itemCX, basketTop, COL.gold, 12);
      } else if (it.type === 'weddingDress') {
        score += it.points * multiplier;
        sfxWeddingDress();
        showPopup('weddingDress');
        combo++;
        spawnParticles(itemCX, basketTop, COL.offWhite, 15);
      } else {
        score += it.points * multiplier;
        sfxCatch();
        combo++;
        spawnParticles(itemCX, basketTop, COL.sage, 6);
      }

      if (combo === 5) showPopup('combo5');
      if (combo === 10) showPopup('combo10');
      if (combo > maxCombo) maxCombo = combo;
      continue;
    }

    // Check floor
    if (it.y + it.h >= H - 15) {
      items.splice(i, 1);
      if (it.type === 'iron') {
        // Iron on floor is ok; no penalty
        continue;
      }
      // Missed
      floorItems.push({
        x: it.x,
        y: H - 50 - it.h * 0.7 + Math.random() * 5,
        type: it.type,
      });
      messCount++;
      combo = 0;
      sfxDrop();

      if (messCount === 1) showPopup('firstMiss');
      if (messCount === Math.floor(MESS_MAX * 0.7)) showPopup('highMess');

      if (messCount >= MESS_MAX) {
        // Game over
        stopMusic();
        sfxGameOver();
        if (score > highScore) {
          highScore = score;
          newRecord = true;
          saveHighScore();
        }
        state = STATE.GAME_OVER;
        return;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 150 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
// RENDER GAME
// ============================================================
function renderGame() {
  drawBackground();
  drawFloorMess();

  // Draw items
  for (const it of items) {
    drawItem(it.x, it.y, it.type, 2);
  }

  // Draw particles
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2.5);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  drawSara();
  drawGideon();
  drawHUD();
  drawPopup();
  drawMuteBtn();
}

// ============================================================
// RESIZE
// ============================================================
function resize() {
  const parent = canvas.parentElement;
  const pw = parent.clientWidth || window.innerWidth;
  const ph = parent.clientHeight || window.innerHeight;
  const scale = Math.min(pw / W, ph / H);
  renderDpr = Math.min(window.devicePixelRatio || 1, 3);

  // Render at device pixel ratio to keep photos sharp when the canvas is scaled.
  canvas.width = Math.round(W * renderDpr);
  canvas.height = Math.round(H * renderDpr);
  ctx.setTransform(renderDpr, 0, 0, renderDpr, 0, 0);

  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  if (state === STATE.TITLE) {
    drawTitle();
    if (clicked) {
      clicked = false;
      resetGame();
    }
  } else if (state === STATE.PLAYING) {
    updateGame(dt);
    renderGame();
    clicked = false;
  } else if (state === STATE.GAME_OVER) {
    drawGameOver();
    if (clicked) {
      clicked = false;
      resetGame();
    }
  }
}

requestAnimationFrame(gameLoop);
</script>
